name: 게시판 크롤러

on:
  schedule:
    # 매 1시간마다 실행
    # cron 표현식: UTC 기준. 한국 시간(KST) = UTC+9
    - cron: "0 * * * *"
  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 하트비트 커밋을 위한 쓰기 권한

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # seen_posts.json을 캐시로 유지 (runs 간 상태 보존)
      - name: 상태 파일 캐시 복원
        uses: actions/cache@v4
        with:
          path: data/seen_posts.json
          # 캐시 키에 날짜 포함 → 매일 갱신되어 만료 방지
          key: seen-posts-${{ runner.os }}-${{ hashFiles('data/seen_posts.json') }}
          restore-keys: |
            seen-posts-${{ runner.os }}-

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 크롤러 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # 상태 파일이 바뀌었으면 캐시 저장 (자동으로 처리됨)

      - name: 월간 하트비트 커밋 (레포 60일 비활성 방지)
        run: |
          DAY=$(date +%d)
          if [ "$DAY" = "01" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > data/heartbeat.txt
            git add data/heartbeat.txt
            git commit -m "chore: 월간 하트비트 (자동 커밋)"
            git push
          fi
